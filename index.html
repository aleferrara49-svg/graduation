<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alessandra's Graduation</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="card">

    <div class="cap">🎓</div>

    <h1>Alessandra's Graduation</h1>

    <p>
        Capture a memory and share it with Alessandra.
    </p>


    <div class="line"></div>


    <input 
        id="cameraInput" 
        type="file" 
        accept="image/*"
        style="display:none"
    >

    <button class="button" onclick="document.getElementById('cameraInput').click()">
        📸 Take a Photo
    </button>



    <input 
        id="galleryInput" 
        type="file" 
        accept="image/*"
        style="display:none"
    >

    <button class="button second" onclick="document.getElementById('galleryInput').click()">
        🖼 Choose from Gallery
    </button>



    <img id="preview" class="hidden">


    <button id="uploadButton" class="upload hidden">
        Upload Photo
    </button>


    <p id="message"></p>


    <footer>
        Made with ❤️ for Alessandra
    </footer>


</div>


<script type="module" src="script.js"></script>


</body>

</html>
